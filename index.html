
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>NEON GAMER ULTRA - Next-Gen Gaming Optimization Hub</title>
    <meta name="description" content="Premium Windows gaming optimization software with telemetry, AI recommendations, and modular performance tooling.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #050510;
            color: #fafafa;
            overflow-x: hidden;
            min-height: 100vh;
        }
        .manga-font {
            font-family: 'Bangers', cursive;
        }
        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, hsla(253,85%,35%,1) 0, transparent 65%), 
                radial-gradient(at 50% 0%, hsla(280,85%,40%,1) 0, transparent 65%), 
                radial-gradient(at 100% 0%, hsla(190,85%,35%,1) 0, transparent 65%),
                radial-gradient(at 50% 100%, hsla(160,85%,30%,1) 0, transparent 65%);
            filter: blur(50px);
            opacity: 0.7;
        }
        .manga-dots {
            background-image: radial-gradient(rgba(255,255,255,0.08) 1.2px, transparent 1.2px);
            background-size: 30px 30px;
        }
        .glass-panel {
            background: rgba(10, 10, 25, 0.75);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .speed-lines {
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 50px,
                rgba(255, 255, 255, 0.02) 51px,
                transparent 52px
            );
        }
        
        .neon-text-lime { text-shadow: 0 0 8px rgba(163,230,53,0.8); }
        .neon-text-cyan { text-shadow: 0 0 8px rgba(34,211,238,0.8); }
        .neon-text-purple { text-shadow: 0 0 10px rgba(168,85,247,0.8), 0 0 20px rgba(168,85,247,0.3); }
        
        .neon-border-lime { border-color: rgba(163,230,53,0.5) !important; box-shadow: 0 0 20px rgba(163,230,53,0.15) !important; }
        .neon-border-cyan { border-color: rgba(34,211,238,0.5) !important; box-shadow: 0 0 20px rgba(34,211,238,0.15) !important; }
        .neon-border-purple { border-color: rgba(168,85,247,0.5) !important; box-shadow: 0 0 20px rgba(168,85,247,0.15) !important; }
        
        .logo-frame {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            padding: 0;
            backdrop-filter: none;
            overflow: visible;
        }

        .logo-glow {
            filter: drop-shadow(0 0 10px rgba(34,211,238,0.4));
            transition: all 0.4s ease;
            object-fit: contain;
            display: block;
        }
        .logo-glow:hover {
            filter: drop-shadow(0 0 20px rgba(34,211,238,0.6));
            transform: scale(1.05);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #a3e635, #a855f7);
            border-radius: 10px;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "framer-motion": "https://esm.sh/framer-motion@^11.13.1"
  }
}
</script>
</head>
<body class="manga-dots speed-lines">
    <div class="mesh-gradient"></div>
    <div id="root"></div>
</body>
</html>
