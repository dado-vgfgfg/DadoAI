    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #05050a;
            color: #fafafa;
            overflow-x: hidden;
            min-height: 100vh;
        }
        .manga-font {
            font-family: 'Bangers', cursive;
        }
        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, hsla(253,80%,15%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(280,80%,20%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(160,80%,15%,1) 0, transparent 50%);
            filter: blur(80px);
            opacity: 0.5;
        }
        .manga-dots {
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .glass-panel {
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .speed-lines {
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 40px,
                rgba(255, 255, 255, 0.05) 41px,
                transparent 42px
            );
        }
        .neon-text-lime { text-shadow: 0 0 10px rgba(163,230,53,0.5); }
        .neon-text-cyan { text-shadow: 0 0 10px rgba(34,211,238,0.5); }
        .neon-text-pink { text-shadow: 0 0 10px rgba(244,114,182,0.5); }
        .neon-text-gold { text-shadow: 0 0 15px rgba(234,179,8,0.6); }

        @keyframes shimmer {
            0% { transform: translateX(-100%) skewX(-15deg); }
            100% { transform: translateX(200%) skewX(-15deg); }
        }
        .shimmer-effect {
            position: relative;
            overflow: hidden;
        }
        .shimmer-effect::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 20px rgba(234,179,8,0.2); }
            50% { box-shadow: 0 0 50px rgba(234,179,8,0.5); }
        }
        .elite-tier {
            animation: pulse-gold 4s infinite ease-in-out;
            border-color: rgba(234, 179, 8, 0.3) !important;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #a3e635, #22d3ee);
            border-radius: 10px;
        }
    </style>
<script type="importmap">
